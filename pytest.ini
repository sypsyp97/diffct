[pytest]
markers =
    cuda: CUDA-dependent smoke tests
    benchmark: Performance benchmarks (opt-in, excluded from default runs)
# Default run excludes the benchmarks directory entirely. Use
#     pytest tests/benchmarks/
# explicitly to run them. This keeps `pytest tests/ -q` fast.
addopts = --ignore=tests/benchmarks
# Disable the timer/timings column noise from pytest-benchmark when not
# running it (so default runs stay quiet).
benchmark_disable_gc = true
benchmark_warmup = true
benchmark_min_rounds = 3
benchmark_max_time = 2.0
